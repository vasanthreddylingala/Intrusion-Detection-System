<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="utf-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>CAN Intrusion</title>
   <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
   <style>
      body {
         font-family: 'Roboto', sans-serif;
         background: url('static/images/I2.jpg') no-repeat center center fixed;
         background-size: cover;
         color: #49a8d1;
         margin: 0;
         padding: 0;
         height: 100vh;
         width: 100vw;
         overflow-x: hidden;
      }
      .sidepanel {
         position: fixed;
         top: 0;
         left: 0;
         height: 100%;
         width: 0;
         background-color: rgba(0, 0, 0, 0.8);
         overflow-x: hidden;
         transition: 0.5s;
         padding-top: 60px;
      }
      .sidepanel a {
         padding: 10px 20px;
         text-decoration: none;
         font-size: 1.2rem;
         color: #fff;
         display: block;
         transition: 0.3s;
      }
      .sidepanel a:hover {
         background: linear-gradient(45deg, #ff5722, #ff9800, #ffeb3b);
         color: white;
         box-shadow: 0 0 10px rgba(255, 87, 34, 0.8);
      }
      .sidepanel .closebtn {
         position: absolute;
         top: 10px;
         right: 25px;
         font-size: 1.5rem;
         color: #fff;
      }
      header {
         padding: 10px 20px;
      }
      .header .logo img {
         max-height: 50px;
      }
      .header .menu-btn {
         float: right;
         color: #fff;
         font-size: 1.5rem;
         background: none;
         border: none;
         cursor: pointer;
      }
      .red_bg {
         background: rgba(255, 255, 255, 0.1);
         color: white;
         padding: 20px 0;
         text-align: center;
         border-radius: 8px;
         box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
         max-width: 80%;
         margin: 20px auto;
      }
      .red_bg h2 {
         font-size: 2.5rem;
         font-weight: bold;
      }
      .form-container {
         background-color: white;
         padding: 40px;
         border-radius: 8px;
         box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
         max-width: 600px;
         margin: 30px auto;
      }
      .form-container h1 {
         color: #00796b;
         margin-bottom: 20px;
      }
      .form-container input {
         width: 100%;
         padding: 10px;
         margin: 15px 0;
         border: 1px solid #ccc;
         border-radius: 5px;
      }
      .form-container button {
         display: inline-block;
         background-color: #7cd1c3;
         color: white;
         padding: 10px 20px;
         font-size: 1rem;
         text-decoration: none;
         border-radius: 5px;
         transition: all 0.3s ease-in-out;
      }
      .form-container button:hover, .form-container button:active {
         background: linear-gradient(45deg, #ff5722, #ff9800, #ffeb3b);
         color: white;
         transform: scale(1.1);
         box-shadow: 0 0 15px rgba(255, 87, 34, 0.8);
      }
   </style>
</head>
<body>
   <div id="mySidepanel" class="sidepanel">
      <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
      <a href="/">Home</a>
      <a href="about">About</a>
      <a href="login">Login</a>
      <a class="active" href="registration">Registration</a>
   </div>
   <header>
      <div class="d-flex align-items-center justify-content-between">
         <div class="logo">
            <a href="index.html"><img src="static/images/can_intrusion.webp" alt="Logo"></a>
         </div>
         <button class="menu-btn" onclick="openNav()">
            <i class="fas fa-bars"></i>
         </button>
      </div>
   </header>
   <div class="red_bg">
      <div class="container">
         <h2>Registration</h2>
      </div>
   </div>
   <div class="form-container">
      <form action="{{ url_for('registration') }}" method="post">
         <center><h1>{{ msg }}</h1></center>
         <input type="text" name="name" placeholder="Name" required>
         <input type="email" name="email" placeholder="Email" required>
         <input type="password" name="psw" placeholder="Password" required minlength="8" maxlength="8">
         <input type="password" name="cpsw" placeholder="Confirm Password" required minlength="8" maxlength="8">
         <input type="tel" name="phone" placeholder="Phone Number" pattern="\d{10}" required title="Phone number must be exactly 10 digits">
         <button type="submit">Register</button>
      </form>
   </div>
   <footer></footer>

   <script>
      function openNav() {
         document.getElementById("mySidepanel").style.width = "250px";
      }
      function closeNav() {
         document.getElementById("mySidepanel").style.width = "0";
      }

      document.querySelector("form").addEventListener("submit", function(event) {
         let phoneInput = document.querySelector("input[name='phone']");
         let phoneValue = phoneInput.value.trim();
         let passwordInput = document.querySelector("input[name='psw']");
         let confirmPasswordInput = document.querySelector("input[name='cpsw']");
         
         // Validate phone number (exactly 10 digits)
         if (!/^\d{10}$/.test(phoneValue)) {
            alert("Phone number must be exactly 10 digits.");
            event.preventDefault();
            return;
         }

         // Validate password (exactly 8 characters)
         if (passwordInput.value.length !== 8) {
            alert("Password must be exactly 8 characters.");
            event.preventDefault();
            return;
         }

         // Ensure passwords match
         if (passwordInput.value !== confirmPasswordInput.value) {
            alert("Passwords do not match.");
            event.preventDefault();
            return;
         }
      });

      // Prevent users from typing more than 8 characters in password fields
      document.querySelectorAll("input[type='password']").forEach(input => {
         input.addEventListener("input", function() {
            if (this.value.length > 8) {
               this.value = this.value.slice(0, 8); 
            }
         });
      });
   </script>

   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
