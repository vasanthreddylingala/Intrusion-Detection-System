<!DOCTYPE html>
<html lang="en">
<head>
   <!-- Meta tags -->
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>CAN Intrusion</title>
   <!-- Google Fonts -->
   <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
   <!-- Bootstrap CSS -->
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
   <!-- Custom CSS -->
   <style>
      body {
         font-family: 'Roboto', sans-serif;
         background: linear-gradient(to bottom, #e0f7fa, #80deea);
         color: #333;
         margin: 0;
         padding: 0;
      }

      .sidebar {
         position: fixed;
         top: 0;
         left: 0;
         height: 100%;
         width: 200px;
         background-color: #004d40;
         padding-top: 2rem;
         display: flex;
         flex-direction: column;
         align-items: start;
         box-shadow: 2px 0 5px rgba(0, 0, 0, 0.2);
         z-index: 1000;
      }

      .sidebar a {
         text-decoration: none;
         color: #fff;
         padding: 10px 20px;
         font-size: 1rem;
         display: block;
         width: 100%;
      }

      .sidebar a:hover, .sidebar a.active {
         background-color: #00796b;
         color: #e0f7fa;
         font-weight: bold;
      }

      .content {
         margin-left: 220px;
         padding: 2rem;
      }

      .banner {
         background-color: #004d40;
         color: #fff;
         text-align: center;
         padding: 2rem 1rem;
         margin-bottom: 2rem;
      }

      .banner h1 {
         font-size: 2.5rem;
         font-weight: bold;
      }

      .form-container {
         background: #ffffff;
         box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
         border-radius: 8px;
         padding: 2rem;
         max-width: 600px;
         margin: 0 auto;
         text-align: center;
      }

      .form-container h2 {
         margin-bottom: 1.5rem;
         color: #00796b;
         font-size: 1.5rem;
         font-weight: bold;
      }

      .form-container input[type="text"] {
         width: 100%;
         padding: 10px;
         border: 1px solid #ccc;
         border-radius: 5px;
         font-size: 1rem;
         margin-bottom: 1.5rem;
      }

      .form-container input[type="text"]:focus {
         border-color: #00796b;
         box-shadow: 0 0 5px rgba(0, 121, 107, 0.5);
      }

      .btn-submit {
         display: inline-block;
         width: auto;
         background-color: #00796b;
         color: #fff;
         border: none;
         padding: 10px 20px;
         font-size: 1rem;
         border-radius: 5px;
         cursor: pointer;
         transition: background-color 0.3s ease;
      }

      .btn-submit:hover {
         background-color: #004d40;
      }

      .message-box {
         text-align: center;
         margin-bottom: 1.5rem;
         font-size: 1.25rem;
         color: #00796b;
         font-weight: bold;
      }

      @media (max-width: 768px) {
         .sidebar {
            width: 100%;
            height: auto;
            position: relative;
         }
         .content {
            margin-left: 0;
         }
      }
   </style>
</head>
<body>
   <!-- Sidebar -->
   <div class="sidebar">
      <a href="load">Upload Data</a>
      <a href="view">View Data</a>
      <a class="active" href="preprocessing">Preprocessing</a>
      <a href="model">Model Training</a>
      <a href="prediction">Prediction</a>
      <a href="/">Logout</a>
   </div>

   <!-- Content -->
   <div class="content">
      <!-- Banner -->
      <div class="banner">
         <h1>Preprocessing</h1>
      </div>

      <!-- Form Container -->
      <div class="form-container">
         <h2>Enter Split Size</h2>

         <!-- Dynamic Message -->
         {% if msg %}
         <div class="message-box">
            {{ msg }}
         </div>
         {% endif %}

         <form action="{{ url_for('preprocessing') }}" method="post">
            <label for="split" class="form-label">Test Data Size:</label>
            <input type="text" id="split" name="split" placeholder="Enter Test Data Size" required>
            <button type="submit" class="btn-submit">Submit</button>
         </form>
      </div>
   </div>
</body>
</html>
