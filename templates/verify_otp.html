<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
      
        body {
            background: url('static/images/I2.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .otp-container {
            background: rgba(0, 0, 0, 0.7); /* Dark overlay */
            padding: 30px;
            border-radius: 10px;S
            box-shadow: 0px 0px 15px rgba(0, 255, 255, 0.3);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .form-control {
            text-align: center;
            font-size: 20px;
            letter-spacing: 5px;
        }
        .btn-primary {
            background: #00ffcc;
            border: none;
            font-size: 18px;
            width: 100%;
        }
        .btn-primary:hover {
            background: #00cc99;
        }
    </style>

</head>
<body>

 
    
     <div class="otp-container">
         <h3>Enter OTP</h3>
         <p>Please check your email and enter the 6-digit code.</p>
         
         <form method="POST">
             <input type="text" class="form-control mb-3" name="otp" placeholder="●●●●●●" required maxlength="6">
             <button type="submit" class="btn btn-primary">Verify OTP</button>
         </form>
     </div>

</body>
</html>
