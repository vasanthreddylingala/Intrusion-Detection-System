<!DOCTYPE html>
<html lang="en">
<head>
   <!-- Meta tags -->
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>CAN Intrusion</title>
   <!-- Google Fonts -->
   <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
   <!-- Bootstrap CSS -->
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
   <!-- Custom CSS -->
   <style>
      body {
         font-family: 'Roboto', sans-serif;
         background: linear-gradient(to bottom, #e0f7fa, #80deea);
         color: #333;
         margin: 0;
         padding: 0;
      }

      .sidebar {
         position: fixed;
         top: 0;
         left: 0;
         height: 100%;
         width: 200px;
         background-color: #004d40;
         padding-top: 2rem;
         display: flex;
         flex-direction: column;
         align-items: start;
         box-shadow: 2px 0 5px rgba(0, 0, 0, 0.2);
         z-index: 1000;
      }

      .sidebar a {
         text-decoration: none;
         color: #fff;
         padding: 10px 20px;
         font-size: 1rem;
         display: block;
         width: 100%;
      }

      .sidebar a:hover, .sidebar a.active {
         background-color: #00796b;
         color: #e0f7fa;
         font-weight: bold;
      }

      .content {
         margin-left: 220px;
         padding: 2rem;
      }

      .banner {
         background-color: #004d40;
         color: #fff;
         text-align: center;
         padding: 2rem 1rem;
         margin-bottom: 2rem;
      }

      .banner h1 {
         font-size: 2.5rem;
         font-weight: bold;
      }

      .form-container {
         background: #ffffff;
         box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
         border-radius: 8px;
         padding: 2rem;
         max-width: 800px;
         margin: 0 auto;
      }

      .form-container h2 {
         text-align: center;
         margin-bottom: 1.5rem;
         color: #00796b;
      }

      .message-box {
         text-align: center;
         margin-bottom: 1rem;
         font-size: 1.25rem;
         color: #00796b;
         font-weight: bold;
      }

      select {
         width: 100%;
         padding: 10px;
         border: 1px solid #ccc;
         border-radius: 5px;
      }

      select:focus {
         border-color: #00796b;
         box-shadow: 0 0 5px rgba(0, 121, 107, 0.5);
      }

      .btn-submit {
         display: block;
         width: 100%;
         background-color: #00796b;
         color: #fff;
         border: none;
         padding: 12px;
         font-size: 1rem;
         border-radius: 5px;
         cursor: pointer;
         transition: background-color 0.3s ease;
         margin-top: 1.5rem;
      }

      .btn-submit:hover {
         background-color: #004d40;
      }

      @media (max-width: 768px) {
         .sidebar {
            width: 100%;
            height: auto;
            position: relative;
         }
         .content {
            margin-left: 0;
         }
      }
   </style>
</head>
<body>
   <!-- Sidebar -->
   <div class="sidebar">
      <a href="load">Upload Data</a>
      <a href="view">View Data</a>
      <a href="preprocessing">Preprocessing</a>
      <a class="active" href="model">Model Training</a>
      <a href="prediction">Prediction</a>
      <a href="/">Logout</a>
   </div>

   <!-- Content -->
   <div class="content">
      <!-- Banner -->
      <div class="banner">
         <h1>Model Training</h1>
      </div>

      <!-- Form -->
      <div class="form-container">
         <h2>Choose Your Algorithm</h2>

         <!-- Display dynamic messages -->
         {% if msg %}
         <div class="message-box">
            {{ msg }}
         </div>
         {% endif %}
         {% if msg1 %}
         <div class="message-box">
            {{ msg1 }}
         </div>
         {% endif %}

         <form action="{{ url_for('model') }}" method="post">
            <label for="algo" class="form-label">Select an Algorithm</label>
            <select name="algo" id="algo">
               <option value="0">Select an Algorithm</option>
               <option value="1">AdaboostCalssifier</option>
               <option value="2">RandomForestClassifier</option>
               <option value="3">GradientBoostingClassifier</option>
               <option value="4">LSTM</option>
               <option value="5">CatBoostClassifier</option>
            </select>
            <button type="submit" class="btn-submit">Submit</button>
         </form>
      </div>
   </div>
</body>
</html>
