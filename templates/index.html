<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="utf-8">
      <meta http-equiv="X-UA-Compatible" content="IE=edge">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>CAN Intrusion</title>
      <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
      <style>
         body {
            font-family: 'Roboto', sans-serif;
            background: url('static/images/I2.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow-x: hidden;
         }

         .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: transparent;
         }

         .logo img {
            max-height: 100px;
         }

         .menu-btn {
            font-size: 1.5rem;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
         }

         .sidepanel {
            position: fixed;
            top: 0;
            left: 0;
            height: 100%;
            width: 0;
            background-color: rgba(0, 0, 0, 0.8);
            overflow-x: hidden;
            transition: 0.5s;
            padding-top: 60px;
         }

         .sidepanel a {
            padding: 10px 20px;
            text-decoration: none;
            font-size: 1.2rem;
            color: #fff;
            display: block;
            transition: 0.3s;
         }

         .sidepanel a:hover {
            background: linear-gradient(45deg, #ff5722, #ff9800, #ffeb3b);
            color: white;
            box-shadow: 0 0 10px rgba(255, 87, 34, 0.8);
         }

         .sidepanel .closebtn {
            position: absolute;
            top: 10px;
            right: 25px;
            font-size: 1.5rem;
            color: #fff;
         }

         .banner {
            text-align: center;
            padding: 100px 20px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 10px;
            max-width: 80%;
            margin: 120px auto;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
         }

         .banner h1 {
            transition: color 1s ease-in-out, text-shadow 1s ease-in-out;
         }

         .banner h1:hover {
            color: #ff5722;
            text-shadow: 2px 2px 15px rgba(255, 87, 34, 0.8);
         }

         .banner p:hover {
            color: #00e5ff;
            text-shadow: 2px 2px 15px rgba(0, 229, 255, 0.8);
         }

         .btn-custom {
            background-color: #d8bf61;
            color: white;
            padding: 12px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 5px;
            transition: all 0.3s ease-in-out;
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
         }

         .btn-custom:hover, .btn-custom:active {
            background: linear-gradient(45deg, #ff5722, #ff9800, #ffeb3b);
            color: white;
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(255, 87, 34, 0.8);
         }
      </style>
   </head>
   <body>
      <header class="header">
         <div class="logo">
            <a href="index.html"><img src="static/images/can_intrusion.webp" alt="Logo"></a>
         </div>
         <button class="menu-btn" onclick="openNav()">
            <i class="fas fa-bars"></i>
         </button>
      </header>
      <div id="mySidepanel" class="sidepanel">
         <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">×</a>
         <a href="/">Home</a>
         <a href="about">About</a>
         <a href="login">Login</a>
         <a href="registration">Registration</a>
      </div>
      <section class="banner">
         <h1>Intrusion Detection System for Smart Vehicles Using Machine Learning Algorithms</h1>
         <p>Secure your systems with advanced detection technology</p>
         <a class="btn-custom" href="https://en.wikipedia.org/wiki/Intrusion_detection_system" target="_blank">Learn More</a>
      </section>
      <script>
         function openNav() {
            document.getElementById("mySidepanel").style.width = "250px";
         }
         function closeNav() {
            document.getElementById("mySidepanel").style.width = "0";
         }
      </script>
   </body>
</html>
